
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تصميم نزاهة الاحترافي</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
    padding:20px;
}
.container{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    max-width:700px;
    margin:auto;
}
input, button{
    margin:10px;
    padding:10px;
    font-size:16px;
}
canvas{
    margin-top:20px;
    max-width:100%;
    border:1px solid #ddd;
    cursor:move;
}
</style>

</head>
<body>

<div class="container">
    <h2>إضافة الاسم تحت "من أخوكم"</h2>

    <input type="file" id="imageUpload" accept="image/*"><br>
    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا"><br>
    <label>حجم الخط:</label>
    <input type="range" id="fontSize" min="20" max="100" value="40"><br>

    <button onclick="downloadImage()">تحميل الصورة</button>

    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let baseImage = new Image();

let nameX = 0;
let nameY = 0;
let isDragging = false;

document.getElementById("imageUpload").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(event){
        baseImage.onload = function(){
            canvas.width = baseImage.width;
            canvas.height = baseImage.height;
            nameX = canvas.width / 2;
            nameY = canvas.height * 0.85;
            drawImage();
        }
        baseImage.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
});

document.getElementById("nameInput").addEventListener("input", drawImage);
document.getElementById("fontSize").addEventListener("input", drawImage);

function drawImage(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(baseImage,0,0);

    const name = document.getElementById("nameInput").value;
    const size = document.getElementById("fontSize").value;

    ctx.font = "bold " + size + "px Arial";
    ctx.fillStyle = "black";
    ctx.textAlign = "center";
    ctx.fillText(name, nameX, nameY);
}

// Drag functionality
canvas.addEventListener("mousedown", function(e){
    isDragging = true;
});
canvas.addEventListener("mouseup", function(){
    isDragging = false;
});
canvas.addEventListener("mousemove", function(e){
    if(isDragging){
        const rect = canvas.getBoundingClientRect();
        nameX = e.clientX - rect.left;
        nameY = e.clientY - rect.top;
        drawImage();
    }
});

function downloadImage(){
    const link = document.createElement('a');
    link.download = "nazaha-design.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
